<!-- RCS Gutters wordmark — single-line horizontal. For desktop nav bars. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 64" role="img"
     aria-label="Right Choice Seamless Gutters">
  <!-- Bold checkmark, left -->
  <g transform="translate(6 6)">
    <path d="M 4 28 L 18 42 L 46 10"
          fill="none" stroke="#D72027" stroke-width="8"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Vertical divider -->
  <line x1="68" y1="14" x2="68" y2="50" stroke="#D72027" stroke-width="2" stroke-linecap="round"/>

  <!-- Wordmark -->
  <text x="80" y="40"
        font-family="'Fraunces Variable', Fraunces, 'Times New Roman', Georgia, serif"
        font-weight="700" font-size="22" fill="#1A1A1A"
        letter-spacing="0.01em">Right Choice<tspan font-weight="500" fill="#4A5560">  ·  Seamless Gutters</tspan></text>
</svg>
